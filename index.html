<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>EBQAD Automate | المحرك الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --petrol-green: #2D4A4A; /* أخضر نفطي كلاسيك */
            --soft-gray: #f9f9f9;
            --text-black: #1a1a1a;
        }
        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: white; 
            color: var(--text-black);
            margin: 0; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
        }
        .header-app { border-bottom: 1px solid #eee; background: white; }
        .nav-bottom { 
            background: white; 
            height: 65px; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            border-top: 1px solid #eee;
        }
        .nav-item { color: #888; display: flex; flex-direction: column; align-items: center; font-size: 11px; padding-top: 12px; }
        .nav-item.active { color: var(--petrol-green); font-weight: 600; }
        
        .page { display: none; padding: 20px; padding-bottom: 100px; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-main { background: var(--petrol-green); color: white; border-radius: 6px; font-size: 14px; width: 100%; padding: 14px; transition: 0.2s; }
        .console-box { background: #0c0c0c; color: #00ff41; font-family: monospace; font-size: 10px; padding: 12px; height: 100px; border-radius: 6px; overflow-y: auto; }
        .status-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 10px; background: white; transition: 0.2s; }
    </style>
</head>
<body>

    <header class="header-app p-5 flex justify-between items-center">
        <h1 class="text-lg font-light tracking-widest">EBQAD <span class="font-bold" style="color: var(--petrol-green)">AUTOMATE</span></h1>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] text-gray-400 font-medium uppercase">Active System</span>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto">
        <div id="page-add" class="page active">
            <div class="mb-6">
                <h2 class="text-xl font-semibold mb-1">تسجيل الطلاب</h2>
                <p class="text-xs text-gray-400">أدخل البيانات بفاصل شرطة ( - ) للمطابقة الذكية</p>
            </div>

            <textarea id="studentsInput" placeholder="مثال: محمد علي - اسم الأم - الرقم الامتحاني - علمي" 
                      class="w-full h-44 p-4 bg-gray-50 border border-gray-100 rounded-lg outline-none focus:border-[#2D4A4A] text-sm mb-4 font-light"></textarea>
            
            <button onclick="runAutomation()" id="runBtn" class="btn-main flex justify-center items-center gap-3">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                بدء المعالجة الذكية
            </button>
            
            <div class="mt-6">
                <p class="text-[10px] text-gray-400 mb-2 uppercase tracking-tighter">Server Logs</p>
                <div id="logs" class="console-box">> بانتظار الأوامر...</div>
            </div>
        </div>

        <div id="page-names" class="page">
            <h2 class="text-lg font-bold mb-4" style="color: var(--petrol-green)">قائمة القبول</h2>
            <div id="savedList" class="space-y-3"></div>
        </div>

        <div id="page-status" class="page">
            <h2 class="text-lg font-bold mb-4">تقارير النظام</h2>
            <div id="queryList" class="space-y-3"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" onclick="showTab('page-add', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
            <span class="mt-1">إضافة</span>
        </div>
        <div class="nav-item" onclick="showTab('page-names', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="mt-1">الطلاب</span>
        </div>
        <div class="nav-item" onclick="showTab('page-status', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="mt-1">استعلام</span>
        </div>
    </nav>

    <script>
        function showTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        async function runAutomation() {
            const logBox = document.getElementById('logs');
            const btn = document.getElementById('runBtn');
            const input = document.getElementById('studentsInput').value;
            
            if(!input.trim()) return alert("يرجى إدخال البيانات");

            btn.disabled = true;
            btn.style.opacity = "0.5";
            logBox.innerHTML = `<span style="color:#aaa">> جاري الاتصال بالسيرفر السحابي...</span>`;

            try {
                const response = await fetch('https://gkjcvnn599-ebqad-app.hf.space/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ students: input.split('\n').filter(n => n.trim()) })
                });

                const result = await response.json();

                if(result.status === "success") {
                    logBox.innerHTML += `<br><span style="color:#00ff41">> اكتملت المعالجة لـ ${result.data.length} طالب.</span>`;
                    renderResults(result.data);
                }
            } catch (err) {
                logBox.innerHTML += `<br><span style="color:#ff4d4d">> خطأ في السيرفر: تأكد من رفع الملفات بشكل صحيح.</span>`;
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }

        function renderResults(data) {
            const savedList = document.getElementById('savedList');
            const queryList = document.getElementById('queryList');
            savedList.innerHTML = ""; 
            queryList.innerHTML = "";

            data.forEach(item => {
                const isSuccess = item.status === 'ناجح';
                const card = `
                    <div class="status-card flex justify-between items-center shadow-sm">
                        <div>
                            <div class="font-semibold text-sm" style="color:var(--text-black)">${item.name}</div>
                            <div class="text-[10px] text-gray-400 mt-1">${item.note}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[11px] font-bold ${isSuccess ? 'text-green-600' : 'text-red-500'}">
                                ${isSuccess ? 'مقبول' : 'فشل'}
                            </span>
                            <div class="w-1.5 h-1.5 rounded-full ${isSuccess ? 'bg-green-500' : 'bg-red-500'}"></div>
                        </div>
                    </div>`;
                queryList.innerHTML += card;
                if(isSuccess) savedList.innerHTML += card;
            });
        }
    </script>
</body>
</html>
