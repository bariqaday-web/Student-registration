<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EBQAD للأتمتة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f9f9f9; color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 3px solid #FF0000; color: #FF0000; font-weight: bold; }
    </style>
</head>
<body onload="loadSavedData()">

    <div class="bg-black text-white p-4 text-center shadow-md">
        <h1 class="text-xl font-bold italic">EBQAD <span class="text-red-600">PRO</span></h1>
    </div>

    <div class="flex justify-around bg-white border-b sticky top-0 z-10">
        <button onclick="openTab('add')" id="tab-add" class="py-3 px-2 flex-1 active-tab">إضافة جماعية</button>
        <button onclick="openTab('list')" id="tab-list" class="py-3 px-2 flex-1 text-sm">قائمة الطلاب</button>
        <button onclick="openTab('logs')" id="tab-logs" class="py-3 px-2 flex-1 text-red-600 text-sm">العمليات الفاشلة</button>
    </div>

    <div class="p-4 max-w-xl mx-auto">
        
        <div id="add" class="tab-content active space-y-4">
            <div class="bg-white p-4 rounded-lg shadow border-r-4 border-black">
                <h2 class="font-bold mb-2">الإرسال الذكي (سلسلة البيانات)</h2>
                <p class="text-[10px] text-gray-500 mb-4 italic">أدخل: الاسم، الأب، الجد، البطاقة، الرقم الامتحاني، الهاتف، الجنس، نوع التقديم</p>
                
                <textarea id="bulkData" rows="12" 
                    placeholder="ضع كل طالب في سطر.. الاداه ستتعرف على نوع التقديم تلقائياً من المعلومات المتوفرة" 
                    class="w-full border p-3 rounded-lg text-sm focus:border-red-600 outline-none h-64"></textarea>

                <button onclick="startBatchProcess()" id="batchBtn" class="w-full bg-black text-white py-4 rounded-lg font-bold mt-4 shadow-lg active:scale-95 transition">
                    تحليل وبدء التسجيل التلقائي
                </button>
            </div>
        </div>

        <div id="list" class="tab-content">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold">أرشيف الطلاب</h3>
                <button onclick="clearArchive()" class="text-[10px] text-red-500 underline">مسح الأرشيف</button>
            </div>
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="w-full text-right border-collapse text-[12px]">
                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="p-2">الطالب</th>
                            <th class="p-2">الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTable"></tbody>
                </table>
            </div>
        </div>

        <div id="logs" class="tab-content">
            <h3 class="font-bold mb-4 text-red-600">سجل الأخطاء</h3>
            <div id="failedList" class="space-y-2 text-[11px]">
                <p class="text-gray-400 text-center italic">لا توجد أخطاء حالياً</p>
            </div>
        </div>

    </div>

    <script>
        // الرابط الخاص بريلوي
        const RAILWAY_SERVER_URL = "https://your-app.up.railway.app/register";

        function openTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(tabName).classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active-tab');
        }

        // --- نظام الحفظ الدائم (LocalStorage) ---
        function saveToDB(student) {
            let archive = JSON.parse(localStorage.getItem('ebqad_archive') || '[]');
            // تحديث إذا كان موجوداً أو إضافة جديد
            const index = archive.findIndex(s => s.national_id === student.national_id);
            if (index > -1) archive[index] = student;
            else archive.push(student);
            localStorage.setItem('ebqad_archive', JSON.stringify(archive));
            renderTable();
        }

        function loadSavedData() {
            renderTable();
            renderFailed();
        }

        function renderTable() {
            const archive = JSON.parse(localStorage.getItem('ebqad_archive') || '[]');
            const table = document.getElementById('studentsTable');
            table.innerHTML = archive.map(s => `
                <tr class="border-b">
                    <td class="p-2">${s.first_name} ${s.father_name || ''}</td>
                    <td class="p-2 font-bold ${s.status.includes('✅') ? 'text-green-600' : 'text-gray-500'}">${s.status}</td>
                </tr>
            `).join('');
        }

        function renderFailed() {
            const failed = JSON.parse(localStorage.getItem('ebqad_failed') || '[]');
            const list = document.getElementById('failedList');
            if(failed.length > 0) {
                list.innerHTML = failed.map(f => `
                    <div class="bg-red-50 border-r-4 border-red-600 p-2 mb-2">
                        <b>${f.name}:</b> ${f.reason}
                    </div>
                `).join('');
            }
        }

        function clearArchive() {
            if(confirm("هل تريد مسح جميع البيانات؟")) {
                localStorage.clear();
                loadSavedData();
            }
        }

        // --- نظام المعالجة الجماعية ---
        async function startBatchProcess() {
            const rawText = document.getElementById('bulkData').value;
            const lines = rawText.split('\n').filter(l => l.trim() !== "");
            const btn = document.getElementById('batchBtn');
            
            btn.disabled = true;
            btn.innerText = "جاري الأتمتة...";

            for (let line of lines) {
                const parts = line.split(/[،, \t]+/); 
                const student = {
                    first_name: parts[0] || "",
                    father_name: parts[1] || "",
                    grandfather_name: parts[2] || "",
                    national_id: parts[3] || "",
                    exam_number: parts[4] || "",
                    phone: parts[5] || "",
                    gender: parts[6] || "ذكر",
                    type: line.includes("عليا") ? "high" : "low", // ذكاء اصطناعي للتعرف على النوع
                    status: "⏳ جاري المعالجة..."
                };

                saveToDB(student);

                try {
                    const response = await fetch(RAILWAY_SERVER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(student)
                    });
                    const res = await response.json();
                    
                    student.status = res.status === "success" ? "✅ تم بنجاح" : "❌ فشل";
                    if(res.status !== "success") {
                        let failed = JSON.parse(localStorage.getItem('ebqad_failed') || '[]');
                        failed.push({name: student.first_name, reason: res.message});
                        localStorage.setItem('ebqad_failed', JSON.stringify(failed));
                    }
                } catch (e) {
                    student.status = "❌ خطأ اتصال";
                }
                saveToDB(student);
                renderFailed();
            }

            btn.disabled = false;
            btn.innerText = "اكتملت جميع العمليات";
            alert("اكتمل العمل، يرجى مراجعة قائمة الطلاب");
        }
    </script>
</body>
</html>
